<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Monitor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f1efe8;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #888780;
    --green-bg: #eaf3de; --green-text: #27500a; --green-border: #639922;
    --red-bg: #fcebeb;   --red-text: #791f1f;   --red-border: #e24b4a;
    --amber-bg: #faeeda; --amber-text: #633806; --amber-border: #ef9f27;
    --blue-bg: #e6f1fb;  --blue-text: #0c447c;  --blue-border: #378add;
    --radius: 8px; --radius-lg: 12px;
    --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --surface: #252523; --surface2: #2c2c2a;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --text: #f0efe8; --text2: #b4b2a9; --text3: #888780;
      --green-bg: #173404; --green-text: #c0dd97; --green-border: #3b6d11;
      --red-bg: #501313;   --red-text: #f7c1c1;   --red-border: #a32d2d;
      --amber-bg: #412402; --amber-text: #fac775; --amber-border: #854f0b;
      --blue-bg: #042c53;  --blue-text: #b5d4f4;  --blue-border: #185fa5;
    }
  }

  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  #sidebar {
    width: 272px; min-width: 240px;
    background: var(--surface);
    border-right: 0.5px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #sidebar-top { padding: 18px 16px 14px; border-bottom: 0.5px solid var(--border); }
  #sidebar-top h1 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  #sidebar-top .sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  #product-list { flex: 1; overflow-y: auto; padding: 8px; }
  #product-list::-webkit-scrollbar { width: 4px; }
  #product-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .pcard {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.12s, background 0.12s;
  }
  .pcard:hover { border-color: var(--border2); }
  .pcard.active { border-color: var(--blue-border); background: var(--blue-bg); }
  .pcard .pname { font-size: 12px; font-weight: 600; color: var(--text); margin-right: 18px; line-height: 1.35; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    border-radius: 999px; padding: 2px 8px;
    font-size: 10px; font-weight: 700; letter-spacing: .02em;
    margin-top: 7px;
    border: 0.5px solid transparent;
  }
  .badge-stock   { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
  .badge-nostock { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }
  .badge-unknown { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
  .badge-error   { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
  .pprice { display:block; font-size:11px; color:var(--text2); margin-top:6px; }
  .changed-tag { display:block; font-size:10px; color:var(--amber-text); margin-top:4px; }
  .rm {
    position:absolute; top:8px; right:8px;
    background:transparent; border:none; color:var(--text3);
    cursor:pointer; font-size:12px; padding:2px;
  }
  .rm:hover { color: var(--red-text); }

  #add-box {
    padding: 10px 12px 14px;
    border-top: 0.5px solid var(--border);
    background: var(--surface);
  }
  #add-box .label { font-size:11px; color:var(--text3); margin-bottom:6px; }
  #add-row { display:flex; gap:8px; }
  #add-url {
    flex:1; min-width:0; border:0.5px solid var(--border2); background:var(--surface2); color:var(--text);
    border-radius: 8px; padding: 8px 10px; font-size:12px; outline:none;
  }
  #add-url:focus { border-color: var(--blue-border); }
  #add-btn {
    border:none; background:var(--text); color:#fff; border-radius:8px; padding: 8px 12px;
    font-size:12px; font-weight:600; cursor:pointer;
  }
  #add-btn:hover { opacity:.9; }

  /* MAIN */
  #main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #topbar {
    height: 57px;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(14px);
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px;
  }
  @media (prefers-color-scheme: dark) {
    #topbar { background: rgba(37,37,35,0.78); }
  }
  #topbar-left { display:flex; flex-direction:column; gap:2px; }
  #cal-title { font-size:15px; font-weight:600; color:var(--text); }
  #cal-url-link { font-size:11px; color:var(--blue-text); text-decoration:none; display:none; }
  #cal-url-link:hover { text-decoration:underline; }

  #topbar-right { display:flex; align-items:center; gap:10px; }
  .meta { font-size:11px; color:var(--text3); }
  select {
    border:0.5px solid var(--border2);
    background:var(--surface2);
    color:var(--text);
    border-radius: 8px;
    padding: 6px 10px;
    font-size:12px;
    outline:none;
  }

  #stats-bar {
    display:flex; gap:10px; flex-wrap:wrap;
    padding: 14px 18px 0;
  }
  .stat-card {
    background: var(--surface);
    border:0.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    min-width: 130px;
  }
  .stat-label { font-size:11px; color:var(--text3); }
  .stat-val { font-size:18px; font-weight:700; margin-top:2px; letter-spacing:-0.02em; }

  #content {
    flex:1;
    overflow:auto;
    padding: 14px 18px 22px;
  }
  #content::-webkit-scrollbar { width: 8px; }
  #content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 8px; }

  #loading-msg, #empty-msg {
    color: var(--text3);
    font-size: 13px;
    padding: 40px 10px;
    text-align: center;
  }

  #cal-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 14px;
    margin-top: 14px;
  }

  .mcard {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px 12px 10px;
  }
  .mname {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--text);
  }
  .mgrid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .dlabel {
    font-size: 10px;
    color: var(--text3);
    text-align: center;
    padding-bottom: 3px;
  }
  .dcell {
    aspect-ratio: 1 / 1;
    border-radius: 7px;
    font-size: 11px;
    display:flex; align-items:center; justify-content:center;
    background: var(--surface2);
    color: var(--text2);
    position: relative;
    user-select: none;
  }
  .d-stock   { background: var(--green-bg); color: var(--green-text); }
  .d-nostock { background: var(--red-bg); color: var(--red-text); }
  .d-unknown { background: var(--amber-bg); color: var(--amber-text); }
  .d-future  { background: transparent; color: var(--text3); border: 1px dashed var(--border); }
  .d-today   { outline: 1.5px solid var(--blue-border); outline-offset: 1px; }
  .d-changed::after {
    content:"";
    position:absolute; width:5px; height:5px;
    border-radius:50%; background: var(--amber-border);
    top:4px; right:4px;
  }

  #tt {
    position: fixed;
    pointer-events:none;
    z-index: 999;
    background: rgba(28,28,26,.96);
    color: #fff;
    font-size: 11px;
    padding: 8px 10px;
    border-radius: 8px;
    max-width: 220px;
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
    display:none;
    line-height:1.4;
  }

  @media (max-width: 860px) {
    #app { flex-direction: column; height: auto; min-height: 100vh; }
    #sidebar { width: 100%; min-width: 0; height: auto; border-right: none; border-bottom: 0.5px solid var(--border); }
    #main { min-height: 0; }
    #cal-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
  }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-top">
      <h1>Stock Monitor</h1>
      <div class="sub">Produse urmărite zilnic</div>
    </div>
    <div id="product-list"></div>
    <div id="add-box">
      <div class="label">Adaugă produs nou (local)</div>
      <div id="add-row">
        <input id="add-url" type="text" placeholder="https://site.ro/produs..." />
        <button id="add-btn" onclick="addProduct()">Adaugă</button>
      </div>
    </div>
  </aside>

  <main id="main">
    <div id="topbar">
      <div id="topbar-left">
        <div id="cal-title">Se încarcă...</div>
        <a id="cal-url-link" href="#" target="_blank" rel="noopener">Deschide produsul ↗</a>
      </div>
      <div id="topbar-right">
        <div class="meta" id="last-check">—</div>
        <select id="year-sel" onchange="renderCalendar()"></select>
      </div>
    </div>

    <div id="stats-bar" style="display:none"></div>

    <div id="content">
      <div id="loading-msg">Se încarcă datele…</div>
      <div id="empty-msg" style="display:none">Adaugă sau selectează un produs pentru a vedea calendarul.</div>
      <div id="cal-grid" style="display:none"></div>
    </div>
  </main>
</div>

<div id="tt"></div>

<script>
const OWNER = "lupanionut";
const REPO = "stock-monitor";
const RAW_BASE = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/data`;

const MONTHS = ["Ianuarie","Februarie","Martie","Aprilie","Mai","Iunie",
                "Iulie","August","Septembrie","Octombrie","Noiembrie","Decembrie"];
const DAYS = ["L","M","M","J","V","S","D"];
const today = new Date();
const todayStr = today.toISOString().split('T')[0];

let products = [];
let history = {};
let selectedId = null;
let localEdits = [];  // Products added locally (not yet in GitHub)

// Load local product list from localStorage (added via UI)
function loadLocal() {
  try { localEdits = JSON.parse(localStorage.getItem('sm_local_products') || '[]'); } catch(e) { localEdits = []; }
}
function saveLocal() {
  localStorage.setItem('sm_local_products', JSON.stringify(localEdits));
}

async function reloadData() {
  document.getElementById('loading-msg').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  try {
    const [pRes, hRes] = await Promise.all([
      fetch(`${RAW_BASE}/products.json?t=${Date.now()}`),
      fetch(`${RAW_BASE}/history.json?t=${Date.now()}`)
    ]);
    products = await pRes.json();
    history = await hRes.json();

    // Merge local-only products (not yet pushed to GitHub)
    localEdits.forEach(lp => {
      if (!products.find(p => p.id === lp.id)) products.push(lp);
    });

    updateLastCheck();
  } catch(e) {
    console.warn('Could not fetch from GitHub, using localStorage fallback.', e);
    try {
      products = JSON.parse(localStorage.getItem('sm_products') || '[]');
      history = JSON.parse(localStorage.getItem('sm_history') || '{}');
    } catch(e2) { products = []; history = {}; }
    // Merge local edits
    localEdits.forEach(lp => {
      if (!products.find(p => p.id === lp.id)) products.push(lp);
    });
  }
  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  if (!selectedId && products.length > 0) selectedId = products[0].id;
  renderSidebar();
  renderCalendar();
}

function updateLastCheck() {
  let latest = null;
  products.forEach(p => { if (p.lastCheck && (!latest || p.lastCheck > latest)) latest = p.lastCheck; });
  if (latest) {
    const d = new Date(latest);
    document.getElementById('last-check').textContent = 'Ultima verificare: ' + d.toLocaleString('ro-RO');
  }
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function extractName(url) {
  try {
    const path = new URL(url).pathname;
    const parts = path.split('/').filter(Boolean);
    return (parts[parts.length-1] || 'Produs').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()).slice(0,55);
  } catch(e) { return url.slice(0,45); }
}

function addProduct() {
  const inp = document.getElementById('add-url');
  let url = inp.value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;
  if (products.find(p => p.url === url)) { alert('Produsul este deja adăugat.'); return; }
  const p = { id: genId(), url, name: extractName(url), status: 'unknown', lastCheck: null, lastChanged: null, localOnly: true };
  products.push(p);
  localEdits.push(p);
  saveLocal();
  inp.value = '';
  selectedId = p.id;
  renderSidebar();
  renderCalendar();
  // Show instruction for GitHub
  showGitHubTip(url, p.id, p.name);
}

function showGitHubTip(url, id, name) {
  alert(`Produs adăugat local!\n\nPentru a activa verificarea automată zilnică:\n1. Deschide fișierul data/products.json din repo-ul tău GitHub\n2. Adaugă un obiect nou cu:\n   "id": "${id}",\n   "url": "${url}",\n   "name": "${name}",\n   "status": "unknown"\n3. Commit → GitHub Actions va verifica stocul mâine dimineață.`);
}

function removeProduct(id, e) {
  e.stopPropagation();
  if (!confirm('Ștergi produsul din această vizualizare?\n(Nu șterge din GitHub — editează products.json manual)')) return;
  products = products.filter(p => p.id !== id);
  localEdits = localEdits.filter(p => p.id !== id);
  saveLocal();
  if (selectedId === id) selectedId = products.length ? products[0].id : null;
  renderSidebar();
  renderCalendar();
}

function selectProduct(id) {
  selectedId = id;
  renderSidebar();
  renderCalendar();
}

function renderSidebar() {
  const list = document.getElementById('product-list');
  if (!products.length) {
    list.innerHTML = '<div style="padding:20px 12px;text-align:center;color:var(--text3);font-size:12px">Niciun produs adăugat</div>';
    return;
  }
  list.innerHTML = products.map(p => {
    const cls = p.status === 'stock' ? 'badge-stock' : p.status === 'nostock' ? 'badge-nostock' : p.status === 'error' ? 'badge-error' : 'badge-unknown';
    const lbl = p.status === 'stock' ? 'ÎN STOC' : p.status === 'nostock' ? 'FĂRĂ STOC' : p.status === 'error' ? 'EROARE' : 'NECUNOSCUT';
    const changed = p.lastChanged ? `<span class="changed-tag">↕ Schimbat ${p.lastChanged}</span>` : '';
    const local = p.localOnly ? `<span class="changed-tag" style="color:var(--text3)">⚠ Doar local</span>` : '';
    const price = (p.status === 'nostock' || !p.price) ? `<span class="pprice">FĂRĂ STOC</span>` : `<span class="pprice">💰 ${p.price} lei</span>`;
    return `<div class="pcard ${selectedId===p.id?'active':''}" onclick="selectProduct('${p.id}')">
      <button class="rm" onclick="removeProduct('${p.id}',event)" title="Elimină">✕</button>
      <div class="pname">${p.name}</div>
      <span class="badge ${cls}">${lbl}</span>${price}${changed}${local}
    </div>`;
  }).join('');
}

function getStats(pid, year) {
  const h = history[pid] || {};
  let stock = 0, nostock = 0, unknown = 0, changes = 0;
  Object.entries(h).forEach(([date, v]) => {
    if (!date.startsWith(year+'-')) return;
    if (v.status === 'stock') stock++;
    else if (v.status === 'nostock') nostock++;
    else unknown++;
    if (v.changed) changes++;
  });
  return { stock, nostock, unknown, changes };
}

function renderCalendar() {
  const yr = parseInt(document.getElementById('year-sel').value) || today.getFullYear();
  const prod = products.find(p => p.id === selectedId);

  const empty = document.getElementById('empty-msg');
  const grid = document.getElementById('cal-grid');
  const stats = document.getElementById('stats-bar');
  const linkEl = document.getElementById('cal-url-link');

  empty.style.display = prod ? 'none' : 'block';
  grid.style.display = prod ? 'grid' : 'none';
  stats.style.display = prod ? 'flex' : 'none';

  if (!prod) {
    document.getElementById('cal-title').textContent = 'Selectează un produs';
    linkEl.style.display = 'none';
    return;
  }

  document.getElementById('cal-title').textContent = prod.name;
  linkEl.href = prod.url;
  linkEl.style.display = 'inline';

  const s = getStats(selectedId, yr);
  const total = s.stock + s.nostock;
  const pct = total > 0 ? Math.round((s.stock / total) * 100) : 0;
  stats.innerHTML = `
    <div class="stat-card"><div class="stat-label">Zile în stoc</div><div class="stat-val" style="color:var(--green-text)">${s.stock}</div></div>
    <div class="stat-card"><div class="stat-label">Zile fără stoc</div><div class="stat-val" style="color:var(--red-text)">${s.nostock}</div></div>
    <div class="stat-card"><div class="stat-label">Disponibilitate</div><div class="stat-val">${total>0?pct+'%':'—'}</div></div>
    <div class="stat-card"><div class="stat-label">Schimbări status</div><div class="stat-val" style="color:var(--amber-text)">${s.changes}</div></div>`;

  grid.innerHTML = '';
  for (let m = 0; m < 12; m++) {
    grid.appendChild(buildMonth(yr, m, prod));
  }
}

function buildMonth(year, month, prod) {
  const card = document.createElement('div');
  card.className = 'mcard';
  card.innerHTML = `<div class="mname">${MONTHS[month]}</div>`;

  const mgrid = document.createElement('div');
  mgrid.className = 'mgrid';

  DAYS.forEach(d => {
    const lbl = document.createElement('div');
    lbl.className = 'dlabel';
    lbl.textContent = d;
    mgrid.appendChild(lbl);
  });

  let dow = new Date(year, month, 1).getDay();
  dow = dow === 0 ? 6 : dow - 1;
  for (let i = 0; i < dow; i++) {
    const e = document.createElement('div'); e.className = 'dcell';
    mgrid.appendChild(e);
  }

  const days = new Date(year, month+1, 0).getDate();
  const h = history[prod.id] || {};

  for (let d = 1; d <= days; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'dcell';
    cell.textContent = d;
    const entry = h[ds];
    const isFuture = ds > todayStr;

    if (isFuture) cell.classList.add('d-future');
    else if (!entry) cell.classList.add('d-unknown');
    else if (entry.status === 'stock') cell.classList.add('d-stock');
    else cell.classList.add('d-nostock');

    if (ds === todayStr) cell.classList.add('d-today');
    if (entry && entry.changed) cell.classList.add('d-changed');

    if (entry) {
      cell.addEventListener('mouseenter', e => showTT(e, ds, entry));
      cell.addEventListener('mouseleave', hideTT);
    }
    mgrid.appendChild(cell);
  }
  card.appendChild(mgrid);
  return card;
}

function showTT(e, ds, entry) {
  const tt = document.getElementById('tt');
  const st = entry.status === 'stock' ? '<span style="color:var(--green-text)">ÎN STOC</span>' : entry.status === 'nostock' ? '<span style="color:var(--red-text)">FĂRĂ STOC</span>' : 'Necunoscut';
  tt.innerHTML = `<strong>${ds}</strong><br>${st}${entry.changed ? '<br><span style="color:var(--amber-text)">↕ Status schimbat</span>' : ''}${entry.checked_at ? `<br><span style="color:var(--text3);font-size:10px">Verificat ${new Date(entry.checked_at).toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'})}</span>` : ''}`;
  tt.style.display = 'block';
  tt.style.left = (e.clientX + 14) + 'px';
  tt.style.top = (e.clientY - 12) + 'px';
}
function hideTT() { document.getElementById('tt').style.display = 'none'; }

function initYearSel() {
  const sel = document.getElementById('year-sel');
  const yr = today.getFullYear();
  for (let y = yr-1; y <= yr+1; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if (y === yr) o.selected = true;
    sel.appendChild(o);
  }
}

initYearSel();
loadLocal();
reloadData();
</script>
</body>
</html>
